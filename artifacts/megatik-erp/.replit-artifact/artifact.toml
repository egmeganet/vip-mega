kind = "web"
previewPath = "/"
title = "MEGA-TIK Finance & Subscribers ERP"
version = "1.0.0"
id = "artifacts/megatik-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26087

[services.development]
run = "pnpm --filter @workspace/megatik-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/megatik-erp", "run", "build" ]
publicDir = "artifacts/megatik-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26087"
BASE_PATH = "/"
